<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="utf-8">
    <meta name="author" content="Luzie Kübler">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Einkaufsliste</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
<!-- Header mit Navbar samt Logo -->
    <header>
        <nav class="navbar navbar-expand-lg eigene_navbar fs-5 bg-light mb-4">
            <a class="navbar-brand mx-3" href="#"><img src="img/Logo.png" class="img-fluid"
                    alt="Logo der App mit einem Brokkoli, der in einer Pfanne gegart wird"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Navigation ein- oder ausblenden">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Rezepte</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="Einkaufsliste.html">Einkaufsliste</a>
                    </li>
                    <li class="nav-item">
                         <a class="nav-link" href="EigenesRezept.html">Rezept erstellen</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

<!-- Hauptinhalt -->
    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <div class="card shadow-sm">

    <!-- Einkaufszettel-Kopfzeile mit Buttons "alles gekauft", "alles löschen" und "JSON speichern" -->
                    <div class="card-header d-flex justify-content-between align-items-center py-3">
                        <!-- Titel -->
                        <h2 class="mb-0">Einkaufsliste</h2>
                        <!-- Button-->
                        <div class="btn-group" role="group">
                            <button class="btn btn-sm btn-gruen" id="allesgekauft" aria-label="Alle Zutaten auf der Einkaufsliste als gekauft markieren">
                                Alles gekauft
                            </button>
                            <button class="btn btn-sm btn-rot" id="allesloeschen" aria-label="Alle Zutaten von der Einkaufsliste löschen">
                                Alles löschen
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" id="einkaufsliste-json-speichern" aria-label="Einkaufsliste als JSON-Datei speichern">
                                JSON speichern
                            </button>
                        </div>
                    </div>

    <!-- Einkaufszettel-Inhalt -->
                    <div class="card-body">
        <!-- Formulareingabe -->
                        <h6 class="text-muted mb-3">Zur Liste hinzufügen:</h6>
                        <div class="row g-2">
                            <div class="col-12 col-sm-6">
                                <label class="visually-hidden" for="zutat-input">Zutat oder Artikel</label>
                                <input type="text" class="form-control" id="zutat-input"
                                    placeholder="Zutat / Artikel (z.B. Zucker)">
                            </div>
                            <div class="col-6 col-sm-3">
                                <label class="visually-hidden" for="menge-input">Menge</label>
                                <input type="text" class="form-control" id="menge-input"
                                    placeholder="Menge">
                            </div>
                            <div class="col-6 col-sm-3">
                                <label class="visually-hidden" for="einheit-input">Einheit</label>
                                <input type="text" class="form-control" id="einheit-input"
                                    placeholder="Einheit">
                            </div>
                            <div class="col-12 mt-2">
                                <button type="button" class="btn btn-gruen w-100" id="hinzufuegen-button" aria-label="Zutat zur Einkaufsliste hinzufügen">
                                    hinzufügen
                                </button>
                            </div>
                        </div>

                        <div id="einkaufsliste-status" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>

        <!-- Einträge - Platzhalter - werden durch JavaSkript ersetzt-->
                        <div class="border-top mt-4 pt-4">
                            <ul class="list-group" id="einkaufsliste">

                                <li class="list-group-item listen-eintrag p-3">
                                    <span>1</span>
                                    <span>TL</span>
                                    <span class="fw-bold">Glück</span>
                                    <div class="btn-group" role="group">
                                        <button type="button" class="btn btn-sm btn-gruen" aria-label="Zutat als gekauft markieren">gekauft</button>
                                        <button type="button" class="btn btn-sm btn-rot" aria-label="Zutat von der Einkaufsliste löschen">löschen</button>
                                    </div>
                                </li>

                                <li class="list-group-item listen-eintrag p-3">
                                    <span>1</span>
                                    <span>L</span>
                                    <span class="fw-bold">Mondschein</span>
                                    <div class="btn-group" role="group">
                                        <button type="button" class="btn btn-sm btn-gruen" aria-label="Zutat als gekauft markieren">gekauft</button>
                                        <button type="button" class="btn btn-sm btn-rot" aria-label="Zutat von der Einkaufsliste löschen">löschen</button>
                                    </div>
                                </li>

                                <li class="list-group-item listen-eintrag p-3">
                                    <span>100</span>
                                    <span>g</span>
                                    <span class="fw-bold">getrockneter Mut</span>
                                    <div class="btn-group" role="group">
                                        <button type="button" class="btn btn-sm btn-gruen" aria-label="Zutat als gekauft markieren">gekauft</button>
                                        <button type="button" class="btn btn-sm btn-rot" aria-label="Zutat von der Einkaufsliste löschen">löschen</button>
                                    </div>
                                </li>

                            </ul>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Bestätigungsdialog für "alles Löschen" -->
    <div class="modal fade" id="einkaufsliste-loeschen-dialog" tabindex="-1" aria-labelledby="einkaufsliste-loeschen-titel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content eigener-dialog">
                <div class="modal-header"><h2 class="modal-title fs-5" id="einkaufsliste-loeschen-titel">Einkaufsliste löschen?</h2></div>
                <div class="modal-body">Möchtest du wirklich alle Einträge aus der Einkaufsliste löschen?</div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-rot" data-bs-dismiss="modal" aria-label="Löschen der Einkaufsliste abbrechen">Abbrechen</button>
                    <button type="button" class="btn btn-gruen" id="allesloeschen-bestaetigen" aria-label="Gesamte Einkaufsliste endgültig löschen">OK</button>
                </div>
            </div>
        </div>
    </div>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script-einkaufsliste.js"></script>
</body>
</html>
